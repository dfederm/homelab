# The family AI stack, sharing the internal `ai` network: Ollama (local LLM serving), Open
# WebUI (chat frontend, reaches Ollama at http://ollama:11434), SearXNG (private web-search
# backend for Open WebUI, reached at http://searxng:8080), and Athena MCP (homelab-status +
# shopping-list MCP server, reached at http://athena-mcp:8080).
# None of Ollama, SearXNG, or Athena MCP has authentication, so none is ever placed behind the
# public reverse proxy — they are reachable only on the internal `ai` network and the LAN. Open
# WebUI has its own multi-user auth and is exposed publicly via Caddy (the site block lives in
# services/reverse-proxy/Caddyfile). Because it is internet-facing from first boot, claim the
# admin account promptly on a fresh deploy (the first account to register becomes admin).
services:
  ollama:
    container_name: ollama
    image: ollama/ollama:0.30.11@sha256:c484b703176aa19dfc0a54cbfb60ab8094b38faa04283fb77eba1d33319e5eca
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
    volumes:
      # Pulled models persist here so they survive container recreation.
      - ${DOCKER_APPDATA_ROOT}/ollama:/root/.ollama
    ports:
      - '${OLLAMA_HTTP_PORT}:11434'
    networks:
      - ai
    healthcheck:
      test: ['CMD', 'ollama', 'ls']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Declaratively ensures the configured models are present. Runs once each deploy after
  # the server is healthy, then exits. `ollama pull` is idempotent (already-present models
  # are skipped) and runs server-side, so this is a thin API client — no volume needed.
  # A large pull (e.g. qwen3:30b) downloads in the background; follow it with
  # `docker logs -f ollama-pull`.
  ollama-pull:
    container_name: ollama-pull
    image: ollama/ollama:0.30.11@sha256:c484b703176aa19dfc0a54cbfb60ab8094b38faa04283fb77eba1d33319e5eca
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS}
    networks:
      - ai
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -eu
        echo "Ensuring models present: $$OLLAMA_PULL_MODELS"
        for model in $$OLLAMA_PULL_MODELS; do
          echo "==> ollama pull $$model"
          ollama pull "$$model"
        done
        echo "All requested models are present."
    restart: 'no'

  # Multi-user chat / agent frontend in front of Ollama. Reaches the model server over the
  # internal `ai` network at http://ollama:11434. Open WebUI has its own auth (first account
  # created becomes the admin); it is reachable on the LAN via the published port and exposed
  # publicly via Caddy (site block in services/reverse-proxy/Caddyfile).
  # Its SQLite DB + ChromaDB (per-user chats, settings, RAG vectors) persist on ZFS-backed
  # appdata so they survive container recreation.
  # NOTE: many of these env vars (OLLAMA_BASE_URL, WEBUI_URL, TASK_MODEL, ENABLE_OPENAI_API,
  # ENABLE_SIGNUP, DEFAULT_USER_ROLE, RAG_EMBEDDING_*) are "PersistentConfig" — read on first
  # launch then stored in the DB (config.json). After the first deploy they are managed in the
  # UI/DB, so changing them here later has no effect unless the data volume is wiped. They seed
  # sane first-run defaults.
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:v0.9.6@sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - OLLAMA_BASE_URL=http://ollama:11434
      # Public URL, used for share links / OAuth redirects / notifications.
      - WEBUI_URL=https://${OPEN_WEBUI_FQDN}
      # Internal-only stack: don't reach out to OpenAI, only the local Ollama.
      - ENABLE_OPENAI_API=false
      # Family instance: no public self-registration — the admin provisions each account
      # (Admin Settings -> Users -> Add User). NOTE: the very first account to register still
      # becomes the admin (initial-admin signup intentionally bypasses this flag), so create
      # yours promptly on first launch before exposing it externally.
      - ENABLE_SIGNUP=false
      # Defense in depth: any account that does get created lands in 'pending' and cannot use
      # the app (no model access) until an admin approves it.
      - DEFAULT_USER_ROLE=pending
      # Use the small/fast model for background tasks (title/tag/query generation) so the
      # large chat model isn't burned on trivia. Seeds the first-run default; change in the UI.
      - TASK_MODEL=${OPEN_WEBUI_TASK_MODEL}
      # Use the local Ollama embeddings model for RAG instead of Open WebUI's bundled
      # default, so the pulled embeddings model (OPEN_WEBUI_RAG_EMBEDDING_MODEL) is actually used.
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=${OPEN_WEBUI_RAG_EMBEDDING_MODEL}
      # Web search via the self-hosted SearXNG backend (the searxng service below) instead of the
      # built-in DuckDuckGo scraper — private and not rate-limit-prone. Reached over the shared
      # `ai` network at http://searxng:8080. Open WebUI strips the query string and appends
      # format=json itself, so SearXNG must have the JSON format enabled (it does, in
      # searxng/settings.yml). Like the vars above these are PersistentConfig: read on first
      # launch then managed in the UI/DB, so later changes here need a config reset.
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
    volumes:
      - ${DOCKER_APPDATA_ROOT}/open-webui:/app/backend/data
    ports:
      - '${OPEN_WEBUI_HTTP_PORT}:8080'
    networks:
      - ai
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      # Generous on first boot: cold start runs DB migrations + first-run RAG setup.
      start_period: 60s

  # Self-hosted SearXNG metasearch — the private web-search backend Open WebUI queries (see the
  # web-search env on open-webui above), and the intended backend for a future web-search MCP
  # tool. It has no auth, so like Ollama it is never placed behind the public reverse proxy. It
  # is an internal-only backend: no host port is published — consumers reach it over the `ai`
  # network at http://searxng:8080.
  searxng:
    container_name: searxng
    image: searxng/searxng:2026.6.26-f8ffbf36f@sha256:15275f138662b0eefd62c492a919b29c4662c42004efe4b1a245c92cc6d2fef1
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      # Instance secret. SearXNG natively lets this env var override server.secret_key, so the
      # secret stays out of this public repo.
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      # Config is declarative: the committed settings.yml is mounted read-only (the secret is
      # injected via SEARXNG_SECRET above, not stored here). Mounting a repo config file
      # read-only mirrors services/reverse-proxy (Caddyfile) and services/webhook (hooks.json).
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      # Runtime cache (favicons, etc.) on ZFS-backed appdata so it survives container recreation.
      - ${DOCKER_APPDATA_ROOT}/searxng:/var/cache/searxng
    networks:
      - ai
    healthcheck:
      # The image has no guaranteed curl/wget, but its bundled Python venv is always present.
      test:
        - CMD
        - /usr/local/searxng/.venv/bin/python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Athena MCP — the homelab-status MCP server. Exposes homelab health as MCP tools (Beszel systems +
  # metrics, Scrutiny drive SMART health, Proxmox storage capacity + guests — all read-only) plus the
  # Koffan shopping-list tools (list/add/check items) over Streamable HTTP, consumed by Open WebUI's
  # native MCP client at http://athena-mcp:8080. Like Ollama and SearXNG it has no auth, so it is
  # never placed behind the public reverse proxy and publishes no host port — the `ai` network + LAN
  # is the trust boundary.
  # The image is our own, built + published by the athena-mcp repo's Forgejo CI (`dotnet publish
  # -t:PublishContainer`, no Dockerfile) to our Forgejo OCI registry. It is PRIVATE, so the Docker
  # host authenticates via the configure-docker-registry setup module (declarative `docker login`
  # from CONTAINER_REGISTRY_USER/_TOKEN) before `docker compose pull` can fetch it (see the "Athena
  # MCP" section in the root README).
  # `${CONTAINER_REGISTRY}` keeps the registry host out of this public repo; the image name + digest
  # stay in-repo (immutable, non-sensitive), pinning tag AND digest like the `forgejo`/`ollama` idiom.
  athena-mcp:
    container_name: athena-mcp
    # Pinned by tag AND digest (like forgejo/ollama). Renovate can't reach this private registry, so
    # bump both by hand: get the newest tag from the athena-mcp CI publish job summary and the digest
    # from that build's registry manifest.
    image: ${CONTAINER_REGISTRY}/david/athena-mcp:0.1.7@sha256:65643b8be6e71cf45fd7e6cb967054b206cfbe2564570b5869c9006063b529e1
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      # Beszel hub (PocketBase REST) — published on the Docker host. Auth is a read-only service
      # account (email Identity + Password); AuthCollection defaults to `users` unless a _superusers
      # token is needed to read every host's records. Share each new host with this account in Beszel
      # or it is missing from list_systems (see the root README).
      - Homelab__Beszel__BaseUrl=http://${DOCKER_HOST_IP}:${BESZEL_WEB_PORT}
      - Homelab__Beszel__Identity=${ATHENA_MCP_BESZEL_IDENTITY}
      - Homelab__Beszel__Password=${ATHENA_MCP_BESZEL_PASSWORD}
      - Homelab__Beszel__AuthCollection=${ATHENA_MCP_BESZEL_AUTH_COLLECTION:-users}
      # Scrutiny web API — published on the Docker host, no auth (internal-only).
      - Homelab__Scrutiny__BaseUrl=http://${DOCKER_HOST_IP}:${SCRUTINY_WEB_PORT}
      # Proxmox VE API — self-signed cert (AllowInsecureTls trusts it for this client only). Auth is
      # a read-only PVEAuditor API token; the user AND the token both need the role (privsep — see
      # the root README).
      - Homelab__Proxmox__BaseUrl=https://${PROXMOX_IP}:${PROXMOX_WEB_PORT}
      - Homelab__Proxmox__Node=${ATHENA_MCP_PROXMOX_NODE}
      - Homelab__Proxmox__ApiTokenId=${ATHENA_MCP_PROXMOX_TOKEN_ID}
      - Homelab__Proxmox__ApiTokenSecret=${ATHENA_MCP_PROXMOX_TOKEN_SECRET}
      - Homelab__Proxmox__AllowInsecureTls=true
      # Koffan shopping-list REST API — the koffan service is its own compose project on a separate
      # network, so reach it via the host's published port (like Beszel/Scrutiny), not a service name.
      # ApiToken is Koffan's REST token (reused from the koffan service's own KOFFAN_API_TOKEN).
      - Apps__Koffan__BaseUrl=http://${DOCKER_HOST_IP}:${KOFFAN_HTTP_PORT}
      - Apps__Koffan__ApiToken=${KOFFAN_API_TOKEN}
    networks:
      - ai
    healthcheck:
      # The ASP.NET runtime image has no curl/wget/bash, so the server probes its own /health
      # endpoint via its own binary (exit 0 = healthy). See the root README. The timeout is generous
      # because each probe spins up a fresh `dotnet` process.
      test: ['CMD', 'dotnet', '/app/AthenaMcp.Server.dll', '--health-check']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai:
    name: ai
    driver: bridge
