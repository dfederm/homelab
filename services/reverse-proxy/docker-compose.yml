services:
  caddy:
    container_name: caddy
    image: caddy:2.11.3@sha256:ec18ee54aab3315c22e25f3b2babda73ff8007d39b13b3bd1bfffa2f0444c7d9
    # Use "always" instead of "unless-stopped" so the reverse proxy
    # is never accidentally left down after a reboot.
    restart: always
    network_mode: host
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCKER_APPDATA_ROOT}/caddy/data:/data
      - ${DOCKER_APPDATA_ROOT}/caddy/config:/config
    environment:
      - TZ=${TZ}
