services:
  caddy:
    container_name: caddy
    image: caddy:2.11.2@sha256:1e40b251ca9639ead7b5cd2cedcc8765adfbabb99450fe23f130eefabf50f4bc
    # Use "always" instead of "unless-stopped" so the reverse proxy
    # is never accidentally left down after a reboot.
    restart: always
    network_mode: host
    env_file: /etc/homelab.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCKER_APPDATA_ROOT}/caddy/data:/data
      - ${DOCKER_APPDATA_ROOT}/caddy/config:/config
    environment:
      - TZ=${TZ}
