services:
  caddy:
    container_name: caddy
    image: caddy:2.11.2@sha256:25cdc846626b62d05f6b633b9b40c2c9f6ef89b515dc76133cefd920f7dbe562
    # Use "always" instead of "unless-stopped" so the reverse proxy
    # is never accidentally left down after a reboot.
    restart: always
    network_mode: host
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCKER_APPDATA_ROOT}/caddy/data:/data
      - ${DOCKER_APPDATA_ROOT}/caddy/config:/config
    environment:
      - TZ=${TZ}
