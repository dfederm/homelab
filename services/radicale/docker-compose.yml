# Radicale — self-hosted CalDAV/CardDAV server: the homelab's calendar (VEVENT) and contacts
# (VCARD) store. Family devices sync to it with standard CalDAV/CardDAV clients (Apple
# Calendar/Contacts, DAVx5 on Android, Thunderbird).
#
# Auth is Radicale's OWN htpasswd (bcrypt) — deliberately NOT behind Authelia/forward-auth.
# Native CalDAV/CardDAV clients authenticate with HTTP Basic auth, which a forward-auth layer
# would break, so Radicale stays an own-auth holdout. It is still exposed publicly via Caddy
# (site block + .well-known auto-discovery redirects in services/reverse-proxy/Caddyfile), so the
# per-user credentials must be strong.
#
# Config is declarative: the committed ./config file is mounted read-only. The htpasswd file is a
# SECRET, so it is NOT committed — it lives on the NAS at ${CONFIG_DIR}/radicale/users (bcrypt
# hashes, next to the machine env files) and is mounted read-only at /config/users. Collections
# persist on ${DOCKER_APPDATA_ROOT}/radicale (ZFS-backed) so they survive container recreation.
#
# The container runs hardened per the image's recommended production recipe: read-only root
# filesystem, all Linux capabilities dropped except the few needed to drop to the unprivileged
# radicale user (SETUID/SETGID) and stop it (KILL), and no-new-privileges. Radicale runs as a
# non-root user (uid 2999); its data dir is created and owned host-side by pre-up.sh (see
# TAKE_FILE_OWNERSHIP below), so the image's startup chown — and the CHOWN capability — are not
# needed.
services:
  radicale:
    container_name: radicale
    image: tomsquest/docker-radicale:3.7.5.0@sha256:e4e694f859c5580c8e925d15905cae36b378150b43ab9b71c52f9cfeed4a3906
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - KILL
    ports:
      - "${RADICALE_HTTP_PORT}:5232"
    environment:
      - TZ=${TZ}
      # Disable the image's startup `chown -R radicale:radicale /data`. Under this container's
      # dropped capabilities it cannot chown bind-mounted ZFS files to the radicale uid (EPERM)
      # and would crash-loop. The data dir is instead created and owned (uid 2999) host-side by
      # services/radicale/pre-up.sh, where root can chown freely.
      - TAKE_FILE_OWNERSHIP=false
    volumes:
      # Committed Radicale config (filesystem storage, htpasswd+bcrypt auth, from_file rights).
      - ./config:/config/config:ro
      # htpasswd file (bcrypt hashes) — a SECRET kept OFF this public repo, on the NAS config dir.
      # It MUST exist before deploying: a missing bind-mount source is created by Docker as an
      # empty directory, which would break Radicale (htpasswd_filename would point at a dir).
      - ${CONFIG_DIR}/radicale/users:/config/users:ro
      # Rights file (maps usernames -> collection access). Also kept OFF the public repo since it
      # contains family member names; lives on the NAS config dir, mounted read-only. Like the
      # htpasswd file it MUST exist before deploying. See services/radicale/rights.example.
      - ${CONFIG_DIR}/radicale/rights:/config/rights:ro
      # Collections (calendars + address books) persist on ZFS-backed appdata.
      - ${DOCKER_APPDATA_ROOT}/radicale:/data
    healthcheck:
      # "Is the server answering?" On this image an unauthenticated GET / returns 302 (redirect to
      # the /.web UI); auth-required collection paths return 401; some paths return 200. Treat any
      # of these as up — a down server yields no/erroring response (curl exits non-zero).
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:5232/ | grep -qE '^(200|302|401)$$'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
