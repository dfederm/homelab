services:
  zwave-js-ui:
    container_name: zwave-js-ui
    image: zwavejs/zwave-js-ui:11.16.2@sha256:c43f88e2e395bb4b37c9e87e64998b751b1e1908318177623cebe08867e1eb42
    restart: always
    tty: true
    stop_signal: SIGINT
    environment:
      - SESSION_SECRET=${ZWAVE_SESSION_SECRET}
      - ZWAVEJS_EXTERNAL_CONFIG=/usr/src/app/store/.config-db
      - TZ=${TZ}
    networks:
      - zwave
    devices:
      - '${ZWAVE_DEVICE}:/dev/zwave'
    volumes:
      - zwave-config:/usr/src/app/store
    ports:
      - '${ZWAVE_WEB_PORT}:8091'
      - '${ZWAVE_WS_PORT}:3000'
networks:
  zwave:
volumes:
  zwave-config:
    name: zwave-config
