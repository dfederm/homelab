services:
  zwave-js-ui:
    container_name: zwave-js-ui
    image: zwavejs/zwave-js-ui:11.18.0@sha256:7490fde184be1c55bf4d7d06a29616a4996b711a57b2d01a8660571925b1b1b1
    restart: always
    tty: true
    stop_signal: SIGINT
    environment:
      - SESSION_SECRET=${ZWAVE_SESSION_SECRET}
      - ZWAVEJS_EXTERNAL_CONFIG=/usr/src/app/store/.config-db
      - TZ=${TZ}
    networks:
      - zwave
    devices:
      - '${ZWAVE_DEVICE}:/dev/zwave'
    volumes:
      - zwave-config:/usr/src/app/store
    ports:
      - '${ZWAVE_WEB_PORT}:8091'
      - '${ZWAVE_WS_PORT}:3000'
networks:
  zwave:
volumes:
  zwave-config:
    name: zwave-config
