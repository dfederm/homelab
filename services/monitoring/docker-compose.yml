services:
  beszel:
    container_name: beszel
    image: henrygd/beszel:0.18.7@sha256:a849ad80814b6a1a3be665304dcace5d4854b3bed7bde4dd1227e8ce1b82d477
    restart: unless-stopped
    ports:
      - "${BESZEL_WEB_PORT}:8090"
    volumes:
      - ${DOCKER_APPDATA_ROOT}/beszel:/beszel_data
      - beszel-socket:/beszel_socket
    environment:
      - TZ=${TZ}

  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent:0.18.7@sha256:8874e2c53f9de5e063a6a80d6b617e20fa593ac5dc4eb4c6ce1f912f510f38f8
    restart: unless-stopped
    network_mode: host
    volumes:
      - beszel-socket:/beszel_socket
      - ${DOCKER_APPDATA_ROOT}/beszel-agent:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LISTEN=/beszel_socket/beszel.sock
      # KEY is set after first hub setup — copy the public key from the hub UI when adding a system.
      # Host/IP in the hub UI should be /beszel_socket/beszel.sock (socket mode, not TCP).
      - KEY=${BESZEL_AGENT_KEY}

  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2.2.1@sha256:7337368a77873f159435de9ef09567f68c31285ed5f951dec36256c4b267ee44
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_WEB_PORT}:3001"
    volumes:
      - ${DOCKER_APPDATA_ROOT}/uptime-kuma:/app/data
    environment:
      - TZ=${TZ}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  beszel-socket:
