services:
  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent:0.18.7@sha256:8874e2c53f9de5e063a6a80d6b617e20fa593ac5dc4eb4c6ce1f912f510f38f8
    restart: unless-stopped
    network_mode: host
    volumes:
      - beszel-agent-data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - LISTEN=${BESZEL_AGENT_PORT}
      # KEY is the hub's public SSH key (shared by all agents).
      # When adding a system in the hub UI, set Host/IP to <machine-ip>:<port>.
      - KEY=${BESZEL_AGENT_KEY}

volumes:
  beszel-agent-data:
