# Authelia — the homelab's single sign-on / identity provider. It offers two integration methods:
#   • OpenID Connect 1.0 (OIDC) provider — apps that speak OIDC use Authelia as their login IdP,
#     which also works for their native/mobile apps. Open WebUI is the first surface; Forgejo,
#     Immich, Vikunja, and Miniflux can follow the same recipe (see services/authelia/README.md).
#   • forward-auth — Caddy can gate browser-only web UIs by delegating auth to Authelia. None are
#     wired yet; add them per surface (a Caddy `forward_auth` directive + an access_control rule).
# Some services deliberately stay on their OWN auth and are NOT placed behind Authelia because SSO
# breaks their native clients: Jellyfin (TV/tablet apps), Home Assistant (companion app), Radicale
# (CalDAV Basic auth). Those holdouts also act as an accidental break-glass if Authelia is down.
#
# Config is declarative: the committed ./configuration.yml is mounted read-only (like the Caddyfile
# and searxng settings.yml). It carries NO secrets and NO personal domains — scalar secrets come
# from the AUTHELIA_* environment below, and personal values (domains, the OIDC issuer key) are
# injected by Authelia's `template` config filter from the non-secret env vars / mounted files
# below. The file user backend (password hashes + family emails) and the OIDC issuer key are
# SECRETS kept OFF this public repo: they live on the NAS at ${CONFIG_DIR}/authelia/ and are mounted
# read-only. Authelia's own state (SQLite DB of 2FA enrollments + user preferences, plus the
# filesystem notifier file) persists on ZFS-backed appdata.
#
# Session storage is in-memory (no Redis): a single lightweight container. The only cost is that
# active login sessions drop if Authelia restarts (users re-login) — 2FA enrollments persist in the
# SQLite DB regardless. Add Redis later if restart-relogin ever becomes annoying.
services:
  authelia:
    container_name: authelia
    image: authelia/authelia:4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
    # Critical auth infrastructure — like Caddy, use "always" (not "unless-stopped") so SSO is never
    # accidentally left down after a reboot.
    restart: always
    environment:
      - TZ=${TZ}
      # Enable the `template` config filter so configuration.yml can inject the values below with
      # {{ env "…" }} / {{ secret "…" }} — this keeps personal domains and the OIDC issuer key out
      # of the committed, public config file.
      - X_AUTHELIA_CONFIG_FILTERS=template
      # --- Non-secret values consumed by configuration.yml's templates. These are deliberately NOT
      #     AUTHELIA_-prefixed: Authelia's env→config loader only reads AUTHELIA_* vars (so it
      #     ignores these), while the template `env` function can read them (it excludes only
      #     AUTHELIA_/X_AUTHELIA_ vars ending in a secret suffix). ---
      - HOMELAB_ROOT_DOMAIN=${AUTHELIA_ROOT_DOMAIN}
      - HOMELAB_AUTHELIA_URL=https://${AUTHELIA_FQDN}
      - OPEN_WEBUI_REDIRECT_URI=https://${OPEN_WEBUI_FQDN}/oauth/oidc/callback
      # --- Secrets: Authelia loads these natively from the environment (config keys ending in
      #     _SECRET / _KEY). They are intentionally ABSENT from configuration.yml — defining a
      #     secret in both the file and the environment makes Authelia refuse to start. ---
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET=${AUTHELIA_OIDC_HMAC_SECRET}
    volumes:
      # Declarative config (no secrets/domains), mounted read-only like the Caddyfile.
      - ./configuration.yml:/config/configuration.yml:ro
      # SECRETS kept off this public repo, on the NAS config dir, mounted read-only:
      #   users.yml                 — file user backend: argon2 password hashes + display names/emails
      #   oidc.private.pem          — OIDC issuer RSA private key (referenced by configuration.yml's jwks)
      #   open-webui-client.digest  — pbkdf2 digest of the Open WebUI OIDC client secret (a '$'-laden
      #                               PHC string, so it's a file — not an env var — to survive
      #                               `docker compose --env-file` interpolation)
      # All MUST exist before deploying (a missing bind-mount source is created by Docker as an
      # empty directory, which would break Authelia). See services/authelia/README.md.
      - ${CONFIG_DIR}/authelia:/secrets:ro
      # Persistent state (SQLite DB of 2FA enrollments + user prefs; filesystem notifier file) on
      # ZFS-backed appdata so it survives container recreation.
      - ${DOCKER_APPDATA_ROOT}/authelia:/data
    ports:
      # Host port → Authelia (container 9091). Caddy (network_mode: host) reaches it at
      # localhost:${AUTHELIA_HTTP_PORT}; the auth.<domain> site block proxies to it. Authelia serves
      # plain HTTP here — Caddy terminates TLS.
      - '${AUTHELIA_HTTP_PORT}:9091'
    # The Authelia image ships its own HEALTHCHECK (probing the internal health endpoint), so none
    # is defined here.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
